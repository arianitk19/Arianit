<!DOCTYPE html>
<html lang="sq" class="dark">
<head>


<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AK Archive">
<link rel="apple-touch-icon" href="https://img.icons8.com/?size=100&id=BxYGfRWckJCP&format=png&color=000000">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arianit Krasniçi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Plus+Jakarta+Sans:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root { --bg: #030303; --accent: #ffffff; --card-bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Premium Background */
        .noise {
            position: fixed; inset: 0; opacity: 0.04; pointer-events: none; z-index: 999;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* 3D Stage for Mobile */
        .mobile-stack-container {
            perspective: 1500px;
            padding: 0 5vw;
        }

        .project-card-mobile {
            position: sticky; top: 12vh;
            width: 100%; height: 72vh;
            background: var(--card-bg);
            border-radius: 32px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15vh; overflow: hidden;
            transform-style: preserve-3d;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
        }

        /* Desktop Horizontal Engine */
        @media (min-width: 1024px) {
            .main-wrapper { display: flex; flex-wrap: nowrap; width: 1600vw; height: 100vh; }
            .section-web { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
            .project-card-mobile { position: relative; top: 0; height: 75vh; width: 62vw; margin-bottom: 0; border-radius: 20px; }
        }

        /* Image Parallax Effect */
        .img-parallax-container { width: 100%; height: 120%; position: absolute; top: -10%; left: 0; overflow: hidden; }
        .img-parallax-container img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) brightness(0.6); transition: filter 1s ease; }
        .project-card-mobile:hover img { filter: grayscale(0%) brightness(1); }

        .content-hud {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 3rem; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 60%);
        }

        /* Magnetic Nav HUD */
        .premium-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center;
            mix-blend-mode: difference;
        }

        .nav-link { font-size: 10px; font-weight: 800; letter-spacing: 0.3em; cursor: pointer; transition: 0.3s opacity; }
        .nav-link:hover { opacity: 0.5; }

        /* Custom Scrollbar for Premium Feel */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div class="noise"></div>

    <nav class="premium-nav">
        <div class="nav-link font-display text-2xl tracking-tighter" id="logo-mag">AK.</div>
        <div class="flex items-center gap-12">
            <div onclick="toggleLang()" id="lang-btn" class="nav-link">SQ</div>
            <div class="w-1 h-1 bg-white rounded-full"></div>
        </div>
    </nav>

    <div id="master-wrapper" class="main-wrapper">
        
        <section class="section-web h-screen flex items-center justify-center px-10">
            <div class="max-w-7xl w-full">
                <div class="overflow-hidden">
                    <p id="h-sub" class="text-[10px] tracking-[0.9em] text-white/30 uppercase mb-8 translate-y-full">Web Designer</p>
                </div>
                <h1 id="h-title" class="text-[16vw] lg:text-[12vw] font-display font-extrabold leading-[0.75] tracking-tighter italic">
                    Arianit<br>Krasniçi
                </h1>
            </div>
        </section>

        <div id="dynamic-grid" class="mobile-stack-container lg:flex lg:flex-row lg:p-0 lg:gap-[10vw] lg:px-[10vw]">
            </div>

        <section class="section-web h-screen flex items-center justify-center px-10">
            <div class="text-center">
                <h2 id="f-cta" class="text-[12vw] lg:text-[8vw] font-display font-bold italic tracking-tighter leading-none mb-12">START<br>NOW</h2>
                <a href="mailto:arianit.krasniqi@tekton.com" class="text-white/40 hover:text-white transition-colors duration-500 text-lg font-light tracking-widest border-b border-white/10 pb-2">arianit.krasniqi@tekton.com</a>
            </div>
        </section>

    </div>

    <div id="portal" class="fixed inset-0 z-[2000] hidden bg-[#030303] p-6 lg:p-24 overflow-y-auto lg:overflow-hidden">
        <div class="w-full h-full flex flex-col lg:flex-row gap-16">
            <div class="w-full lg:w-3/5 h-[50vh] lg:h-full rounded-2xl overflow-hidden shadow-2xl">
                <img id="p-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="w-full lg:w-2/5 flex flex-col justify-center">
                <span id="p-cat" class="text-[10px] tracking-[0.6em] text-white/20 font-bold uppercase mb-6">Category</span>
                <h2 id="p-title" class="text-6xl lg:text-8xl font-display font-bold mb-8 tracking-tighter leading-none italic"></h2>
                <p id="p-desc" class="text-xl text-white/40 font-light leading-relaxed mb-12 max-w-md"></p>
                <div class="flex flex-col gap-4">
                    <button class="bg-white text-black py-6 text-[10px] font-bold tracking-[0.4em] uppercase hover:scale-105 transition duration-500">Launch Experience</button>
                    <button onclick="closePortal()" class="border border-white/10 py-6 text-[10px] font-bold tracking-[0.4em] uppercase hover:bg-white/5 transition duration-500">Back to Archive</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        let currentLang = 'sq';
        const projectData = [
            { id: 0, title: 'TEKTON STUDIO', cat: 'Arkitekturë', catEn: 'Architecture', img: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200', desc: 'Sistemi i menaxhimit të projekteve arkitekturore me vizualizim 3D.' },
            { id: 1, title: 'NTP RATKOCI', cat: 'E-Commerce', catEn: 'Retail', img: 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1200', desc: 'Platformë tregtare me performancë të lartë dhe siguri maksimale.' },
            { id: 2, title: 'FRIZER LENDI', cat: 'UI/UX Design', catEn: 'Interface', img: 'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=1200', desc: 'Ndërfaqe premium për rezervime dhe menaxhim të stafit.' },
            { id: 3, title: 'KALKULO APP', cat: 'Financë', catEn: 'Fintech', img: 'Images/Screenshot 2026-04-13 234903.png', desc: 'Analizë financiare dhe llogaritje të saktësisë së lartë.' }
        ];

        const projects = Array.from({length: 13}, (_, i) => ({
            ...projectData[i % projectData.length],
            id: i,
            title: projectData[i % projectData.length].title + (i > 3 ? ` VOL.${i}` : '')
        }));

        function render() {
            const grid = document.getElementById('dynamic-grid');
            grid.innerHTML = '';
            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = "project-card-mobile group section-web";
                card.onclick = () => openPortal(p);
                card.innerHTML = `
                    <div class="img-parallax-container">
                        <img src="${p.img}" class="parallax-img" alt="${p.title}">
                    </div>
                    <div class="content-hud">
                        <span class="text-[9px] tracking-[0.5em] text-white/40 font-bold uppercase mb-3 block">${currentLang === 'sq' ? p.cat : p.catEn}</span>
                        <h3 class="text-5xl lg:text-6xl font-display font-bold uppercase tracking-tighter italic leading-[0.8]">${p.title}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });
            initAnimations();
        }

        function initAnimations() {
            // Intro Animation
            gsap.to("#h-sub", { y: 0, duration: 1.5, ease: "expo.out" });
            gsap.from("#h-title", { opacity: 0, y: 100, duration: 1.5, delay: 0.2, ease: "expo.out" });

            if (window.innerWidth >= 1024) {
                // Desktop Horizontal + Parallax
                const wrapper = document.getElementById('master-wrapper');
                gsap.to(wrapper, {
                    x: () => -(wrapper.scrollWidth - window.innerWidth),
                    ease: "none",
                    scrollTrigger: {
                        trigger: wrapper,
                        pin: true, scrub: 1,
                        end: () => "+=" + wrapper.scrollWidth
                    }
                });

                document.querySelectorAll('.parallax-img').forEach(img => {
                    gsap.to(img, {
                        x: -100,
                        ease: "none",
                        scrollTrigger: {
                            trigger: img,
                            containerAnimation: gsap.to(wrapper, {x: -(wrapper.scrollWidth - window.innerWidth)}), // sync with horizontal
                            scrub: true
                        }
                    });
                });
            } else {
                // Mobile 3D Stacking
                document.querySelectorAll('.project-card-mobile').forEach((card) => {
                    gsap.to(card, {
                        scale: 0.8,
                        rotationX: -10,
                        opacity: 0,
                        scrollTrigger: {
                            trigger: card,
                            start: "top 5%",
                            end: "bottom top",
                            scrub: true
                        }
                    });
                });
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'sq' ? 'en' : 'sq';
            document.getElementById('lang-btn').innerText = currentLang === 'sq' ? 'ALB / SQ' : 'ENG / US';
            document.getElementById('h-sub').innerText = currentLang === 'sq' ? 'Inxhinieri Vizionare' : 'Visionary Engineering';
            document.getElementById('h-title').innerHTML = currentLang === 'sq' ? 'ARKIVË<br>ELITË' : 'ELITE<br>ARCHIVE';
            document.getElementById('f-cta').innerHTML = currentLang === 'sq' ? 'NISU<br>TANI' : 'START<br>NOW';
            render();
        }

        function openPortal(p) {
            const portal = document.getElementById('portal');
            document.getElementById('p-title').innerText = p.title;
            document.getElementById('p-cat').innerText = currentLang === 'sq' ? p.cat : p.catEn;
            document.getElementById('p-desc').innerText = p.desc;
            document.getElementById('p-img').src = p.img;
            portal.classList.remove('hidden');
            gsap.fromTo(portal, { clipPath: "circle(0% at 50% 50%)" }, { clipPath: "circle(150% at 50% 50%)", duration: 1, ease: "expo.inOut" });
            document.body.style.overflow = 'hidden';
        }

        function closePortal() {
            gsap.to("#portal", { clipPath: "circle(0% at 50% 50%)", duration: 0.8, ease: "expo.inOut", onComplete: () => {
                document.getElementById('portal').classList.add('hidden');
                document.body.style.overflow = 'auto';
            }});
        }

        // Magnetic Effect Logic
        const logo = document.getElementById('logo-mag');
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            if (window.innerWidth >= 1024) {
                const rect = logo.getBoundingClientRect();
                const x = (clientX - (rect.left + rect.width / 2)) * 0.2;
                const y = (clientY - (rect.top + rect.height / 2)) * 0.2;
                gsap.to(logo, { x, y, duration: 0.5 });
            }
        });

        render();
        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
